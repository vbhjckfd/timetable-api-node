name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC (npm provenance + MCP registry)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Set version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
          node -e "
            const fs = require('fs');
            const s = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            s.version = '$VERSION';
            fs.writeFileSync('server.json', JSON.stringify(s, null, 2) + '\n');
          "

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      - run: npm publish

      - name: Publish to Official MCP Registry
        run: |
          RELEASE=$(curl -sf https://api.github.com/repos/modelcontextprotocol/registry/releases/latest | grep tag_name | cut -d '"' -f4)
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${RELEASE}/mcp-publisher_linux_amd64.tar.gz" | tar -xz -C /usr/local/bin mcp-publisher
          mcp-publisher publish

      - name: Publish to Smithery
        if: env.SMITHERY_API_KEY != ''
        run: npx --yes @smithery/cli mcp publish https://api.lad.lviv.ua/mcp -n vbhjckfd/timetable-api-node
